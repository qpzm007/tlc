<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Machining</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Main CSS (Tailwind) -->
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="antialiased overflow-x-hidden selection:bg-brand-500 selection:text-white bg-metal-900 text-slate-50">

    <!-- Header will be injected here -->
    <div id="header-container"></div>

    <main>
        <!-- Sections will be injected here -->
        <div id="hero-container"></div>
        <div id="company-container"></div>
        <div id="products-container"></div>
        <div id="equipment-container"></div>
        <div id="clients-container"></div>
        <div id="location-container"></div>
        <div id="inquiry-container"></div>
    </main>

    <!-- Footer will be injected here -->
    <div id="footer-container"></div>

    <!-- Chat Widget will be injected here -->
    <div id="chat-container"></div>

    <!-- Main Entry Point -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
