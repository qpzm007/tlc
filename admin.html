<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex MCT - CMS Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .drag-over { border: 2px dashed #0ea5e9 !important; background-color: rgba(14, 165, 233, 0.1); }
    </style>
</head>
<body class="antialiased bg-metal-900 text-slate-50 min-h-screen">

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="bg-metal-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/10">
            <div class="text-center mb-8">
                <i class="ph ph-hexagon text-brand-500 text-5xl mb-2"></i>
                <h2 id="login-brand-name" class="text-2xl font-bold text-white uppercase tracking-widest">CMS</h2>
                <p class="text-gray-400 mt-2 text-sm">관리자 계정으로 로그인해주세요.</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">ID</label>
                    <input type="text" id="admin-id" value="admin" class="w-full bg-metal-900 border border-white/10 rounded-md px-4 py-2 text-white focus:outline-none focus:border-brand-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                    <input type="password" id="admin-pw" class="w-full bg-metal-900 border border-white/10 rounded-md px-4 py-2 text-white focus:outline-none focus:border-brand-500" required>
                </div>
                <div id="login-error" class="text-red-500 text-sm hidden">아이디 또는 비밀번호가 잘못되었습니다. (기본값: admin / admin1234)</div>
                <button type="submit" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-bold py-3 px-4 rounded-md transition duration-300 mt-4">
                    로그인
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Layout (Hidden by default) -->
    <div id="admin-layout" class="hidden flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-black border-r border-white/5 flex flex-col">
            <div class="h-20 flex items-center px-6 border-b border-white/5 cursor-pointer">
                <i class="ph ph-hexagon text-brand-500 text-2xl mr-2"></i>
                <span id="sidebar-brand-name" class="font-bold text-lg text-white uppercase tracking-widest">CMS</span>
            </div>
            <nav class="flex-1 overflow-y-auto py-4 space-y-1">
                <a href="#" data-tab="dashboard" class="admin-tab flex items-center px-6 py-3 text-brand-400 bg-brand-500/10 border-r-2 border-brand-500">
                    <i class="ph ph-squares-four mr-3 text-lg"></i> 대시보드
                </a>
                <a href="#" data-tab="company" class="admin-tab flex items-center px-6 py-3 text-gray-400 hover:bg-white/5 hover:text-white transition">
                    <i class="ph ph-buildings mr-3 text-lg"></i> 회사 정보
                </a>
                <a href="#" data-tab="certs" class="admin-tab flex items-center px-6 py-3 text-gray-400 hover:bg-white/5 hover:text-white transition">
                    <i class="ph ph-certificate mr-3 text-lg"></i> 인증서 관리
                </a>
                <a href="#" data-tab="products" class="admin-tab flex items-center px-6 py-3 text-gray-400 hover:bg-white/5 hover:text-white transition">
                    <i class="ph ph-cube mr-3 text-lg"></i> 제품 & 포트폴리오
                </a>
                <a href="#" data-tab="equipment" class="admin-tab flex items-center px-6 py-3 text-gray-400 hover:bg-white/5 hover:text-white transition">
                    <i class="ph ph-wrench mr-3 text-lg"></i> 주요 설비 관리
                </a>
                <a href="#" data-tab="uitext" class="admin-tab flex items-center px-6 py-3 text-gray-400 hover:bg-white/5 hover:text-white transition">
                    <i class="ph ph-text-t mr-3 text-lg"></i> 사이트 UI 문구 관리
                </a>
                <a href="#" data-tab="clients" class="admin-tab flex items-center px-6 py-3 text-gray-400 hover:bg-white/5 hover:text-white transition">
                    <i class="ph ph-users mr-3 text-lg"></i> 고객사 로고
                </a>
                <a href="#" data-tab="inquiries" class="admin-tab flex items-center px-6 py-3 text-gray-400 hover:bg-white/5 hover:text-white transition">
                    <i class="ph ph-envelope mr-3 text-lg"></i> 온라인 문의 <span id="inquiry-badge" class="ml-auto bg-brand-500 text-white text-xs px-2 py-0.5 rounded-full hidden">0</span>
                </a>
            </nav>
            <div class="p-4 border-t border-white/5">
                <button id="logout-btn" class="flex items-center text-gray-400 hover:text-white transition w-full px-2 py-2">
                    <i class="ph ph-sign-out mr-3 text-lg"></i> 로그아웃
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-[#0b1120] p-8" id="main-content">
            <!-- Content will be injected by JS -->
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/admin.js"></script>
</body>
</html>
